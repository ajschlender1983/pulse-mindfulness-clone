<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pulse — Sixty seconds with the people who matter</title>
<meta name="description" content="A gentle sixty-second reflection on how present you are with the people you love. No score, nothing to pass. Just something true, and a way back." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#EBE7D4; --warm:#F9F6E5; --ink:#1A1C22; --brown:#423D32;
    --lime:#E3F47D; --blue:#B3C7D3; --muted:#8a8578;
    --font:"DM Sans",sans-serif; --mono:"DM Mono",monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--font); background:var(--cream); color:var(--ink);
    letter-spacing:-0.02em; line-height:1.4; -webkit-font-smoothing:antialiased;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .wrap{ width:100%; max-width:640px; }
  .card{
    background:var(--warm); border-radius:26px; padding:44px 40px;
    box-shadow:0 30px 80px rgba(66,61,50,.10); position:relative; overflow:hidden;
  }
  .logo{ font-size:22px; font-weight:500; letter-spacing:-0.05em; color:var(--ink); margin-bottom:30px; display:flex; align-items:baseline; }
  .logo span{ color:var(--lime); margin-left:2px; }
  .eyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }
  h1{ font-weight:400; font-size:clamp(28px,5vw,40px); line-height:1.06; letter-spacing:-0.04em; color:var(--ink); }
  h2{ font-weight:400; font-size:clamp(22px,4vw,29px); line-height:1.12; letter-spacing:-0.035em; color:var(--ink); }
  p{ font-size:17px; color:#575344; letter-spacing:-0.02em; }
  p.lede{ font-size:19px; color:#4a4638; margin-top:16px; }
  .teach{ font-size:15px; color:var(--muted); margin-top:12px; font-style:italic; letter-spacing:-0.015em; }
  .fade{ animation:fade .6s ease both; }
  @keyframes fade{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

  .flag{ margin-top:22px; padding:14px 18px; border-left:2px solid #d8d2bd; }
  .flag p{ font-size:14.5px; color:var(--muted); font-style:italic; }

  /* buttons */
  .btn{
    appearance:none; border:none; cursor:pointer; font-family:var(--font);
    font-size:15px; font-weight:500; letter-spacing:-0.01em;
    background:var(--lime); color:var(--ink); padding:15px 30px; border-radius:100px;
    transition:transform .2s ease, filter .2s ease;
  }
  .btn:hover{ filter:brightness(1.05); transform:translateY(-1px); }
  .btn--ghost{ background:transparent; color:var(--muted); padding:12px 8px; }
  .btn-row{ margin-top:32px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }

  /* options */
  .opts{ display:flex; flex-direction:column; gap:11px; margin-top:28px; }
  .opt{
    text-align:left; background:var(--cream); border:1.5px solid transparent; cursor:pointer;
    font-family:var(--font); font-size:16.5px; color:var(--ink); letter-spacing:-0.02em;
    padding:17px 20px; border-radius:15px; transition:all .16s ease; line-height:1.25;
  }
  .opt:hover{ border-color:var(--lime); background:#efebd8; transform:translateX(3px); }

  /* movement markers (three soft phases, never a count) */
  .marks{ display:flex; gap:10px; align-items:center; margin-bottom:28px; }
  .marks i{ height:5px; width:34px; background:#ddd7c3; border-radius:3px; transition:background .4s ease; }
  .marks i.on{ background:var(--lime); }
  .marks .ml{ font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-left:4px; }

  /* breath beat */
  .calc{ text-align:center; padding:30px 0; }
  .breath{ width:120px; height:120px; margin:10px auto 26px; border-radius:50%;
    background:radial-gradient(circle,var(--lime),#cfe06a); animation:breathe 4s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{transform:scale(.72); opacity:.55} 50%{transform:scale(1); opacity:1} }

  /* homecoming reveal */
  .lit{ border-radius:16px; padding:22px 24px; margin-top:24px; background:rgba(227,244,125,.26); }
  .lit .k, .ready .k, .moment .k, .felt .k, .step .k{ font-family:var(--mono); font-size:10px; letter-spacing:.11em; text-transform:uppercase; color:var(--muted); margin-bottom:9px; }
  .lit h3, .ready h3{ font-weight:500; font-size:20px; color:var(--ink); margin-bottom:7px; letter-spacing:-0.03em; }
  .lit p, .ready p, .moment p{ font-size:16px; color:#4a4638; }
  .ready{ border-radius:16px; padding:22px 24px; margin-top:16px; background:var(--cream); }

  .moment{ border-radius:18px; padding:26px; margin-top:24px; background:var(--ink); color:var(--warm); }
  .moment .k{ color:#9a9c9f; }
  .moment p{ color:var(--warm); font-size:18px; letter-spacing:-0.025em; line-height:1.32; }
  .moment .share{ margin-top:16px; padding-top:16px; border-top:1px solid rgba(255,255,255,.14); font-size:15px; color:#dcd8c6; }

  .felt{ margin-top:24px; }
  .felt p{ font-size:16.5px; color:#4a4638; line-height:1.45; }

  .step{ margin-top:24px; }
  .step p{ font-size:17px; color:var(--ink); }

  .hope{ margin-top:24px; font-size:18px; color:var(--ink); letter-spacing:-0.025em; line-height:1.4; }

  /* email offer (soft, not a wall) */
  .gate input{ width:100%; padding:16px 20px; border-radius:100px; border:1.5px solid #cfc9b4;
    background:var(--cream); font-family:var(--font); font-size:16px; color:var(--ink); margin-top:22px; }
  .gate input:focus{ outline:2px solid var(--lime); outline-offset:1px; }
  .fineprint{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:14px; letter-spacing:0; }

  /* CTA + guarantee */
  .cta{ text-align:center; margin-top:32px; }
  .cta .btn{ font-size:16px; padding:17px 40px; }
  .guarantee{ font-size:14.5px; color:var(--muted); margin-top:16px; max-width:420px; margin-left:auto; margin-right:auto; line-height:1.4; }
  .cta .sub{ font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:14px; letter-spacing:0; }
  .restart{ text-align:center; margin-top:18px; }

  @media(max-width:520px){
    .card{ padding:34px 24px; border-radius:22px; }
    .marks i{ width:26px; }
  }
</style>
</head>
<body>
  <div class="wrap"><div class="card" id="app"></div></div>

<script>
(function(){
  "use strict";
  var app = document.getElementById('app');

  // ---- helpers (DOM-built, no innerHTML) ----
  function el(tag, cls, text){ var n=document.createElement(tag); if(cls)n.className=cls; if(text!=null)n.textContent=text; return n; }
  function clear(){ while(app.firstChild) app.removeChild(app.firstChild); }
  function logo(){ var l=el('div','logo'); l.append(document.createTextNode('pulse'), el('span',null,'·')); return l; }

  var state = { who:null, conn:null, clar:null, cap:null, want:null, email:null, bright:null, quiet:null };

  // three movements: label, human framing, question, options [text, fullness 1.5..10], teaching line
  var MOVES = [
    { c:'Connection', frame:'being with the people who matter',
      q:'When you are with them lately, where are you, really?',
      key:'conn',
      o:[['All the way here',10],['In the room, but somewhere else in my head',6],['Present in body, gone in mind',3.5],['I keep meaning to find my way back',1.5]],
      teach:'Presence is just this. Being where your body already is. Nothing to fix.' },
    { c:'Clarity', frame:'seeing the day while you are in it',
      q:'At the end of most days, do you know where your hours went?',
      key:'clar',
      o:[['Yes, I was here for them',10],['Some of it. Some of it is a blur',6],['Honestly, I could not tell you',3.5],['The days just run together',1.5]],
      teach:'Clarity is not doing more. It is noticing your life as it happens.' },
    { c:'Capacity', frame:'having room to feel your own life',
      q:'When something matters, do you have the room to actually feel it?',
      key:'cap',
      o:[['Yes, it lands',10],['Only when I slow down',6],['I notice later, once it has passed',3.5],['I have been running on empty',1.5]],
      teach:'Capacity is the space to be moved by your own life, instead of rushing past it.' }
  ];

  function screen(build, moveIdx){ clear(); var c=el('div','fade'); c.appendChild(logo());
    if(moveIdx!=null){
      var m=el('div','marks');
      for(var i=0;i<3;i++){ var d=el('i'); if(i<=moveIdx) d.className='on'; m.appendChild(d); }
      m.appendChild(el('span','ml', MOVES[moveIdx].c));
      c.appendChild(m);
    }
    build(c); app.appendChild(c); window.scrollTo(0,0);
  }
  function optionBtn(text, onClick){ var b=el('button','opt',text); b.type='button'; b.addEventListener('click',onClick); return b; }

  // ---- Intro ----
  function intro(){ screen(function(c){
    c.appendChild(el('div','eyebrow','Sixty seconds'));
    c.appendChild(el('h1','','How present are you with the people who matter most?'));
    c.appendChild(el('p','lede','Not a test. There is no score and nothing to pass. Presence gives back three things: the people you love, a clear head, and the room to feel it all. In sixty seconds you will see where yours is alive, and one small thing waiting to come home.'));
    var flag=el('div','flag'); flag.appendChild(el('p','','If you came for another streak, number, or dashboard about yourself, this is not that. Pulse does not measure you, and neither will this.'));
    c.appendChild(flag);
    var row=el('div','btn-row');
    var b=el('button','btn','Begin'); b.type='button'; b.addEventListener('click',who);
    row.appendChild(b); c.appendChild(row);
  }); }

  // ---- Anchor: who ----
  var WHO = [
    ['The person beside me','partner'],
    ['The people at home','home'],
    ['A friend I have drifted from','friend'],
    ['Myself','self']
  ];
  function who(){ screen(function(c){
    c.appendChild(el('h2','','Who do you most want to feel close to again?'));
    var o=el('div','opts');
    WHO.forEach(function(w){ o.appendChild(optionBtn(w[0],function(){ state.who=w[1]; move(0); })); });
    c.appendChild(o);
  }); }

  // ---- Three movements ----
  function move(i){ var m=MOVES[i]; screen(function(c){
    c.appendChild(el('div','eyebrow', m.c + ' · ' + m.frame));
    c.appendChild(el('h2','', m.q));
    c.appendChild(el('div','teach', m.teach));
    var o=el('div','opts');
    m.o.forEach(function(pair){ o.appendChild(optionBtn(pair[0],function(){
      state[m.key]=pair[1];
      if(i+1<MOVES.length) move(i+1); else want();
    })); });
    c.appendChild(o);
  }, i); }

  // ---- Want (tunes the first step) ----
  var WANT = [
    ['An evening fully with them','evening'],
    ['A clear, quiet head','head'],
    ['A steadier me','steady'],
    ['A sense of something bigger','bigger']
  ];
  function want(){ screen(function(c){
    c.appendChild(el('h2','','If you could have one of these back tomorrow, which would you choose?'));
    var o=el('div','opts');
    WANT.forEach(function(w){ o.appendChild(optionBtn(w[0],function(){ state.want=w[1]; breath(); })); });
    c.appendChild(o);
  }); }

  // ---- compute bright / quiet C ----
  function compute(){
    var cs=[['Connection', state.conn], ['Clarity', state.clar], ['Capacity', state.cap]].map(function(x){ return [x[0], (x[1]==null?6:x[1])]; });
    var bright=cs[0], quiet=cs[0];
    cs.forEach(function(x){ if(x[1] > bright[1]) bright=x; });
    cs.forEach(function(x){ if(x[1] < quiet[1]) quiet=x; });
    if(quiet[0]===bright[0]){ bright=['Connection',0]; quiet=['Clarity',0]; } // all equal edge case
    state.bright=bright[0]; state.quiet=quiet[0];
  }

  // ---- breath beat ----
  function breath(){ compute(); clear(); var c=el('div','fade calc'); c.appendChild(el('div','breath'));
    c.appendChild(el('h2','','Take one breath with this.'));
    c.appendChild(el('p','','You are already doing the thing. Here is what came up.'));
    app.appendChild(c); window.scrollTo(0,0);
    setTimeout(teaser, 2600);
  }

  var LIT = {
    Connection:'When you choose to be with the people you love, you can be. That is not a small thing. That is the whole thing, still in you.',
    Clarity:'You can still see your days when you slow down enough to look. A lot of people have lost that. You have not.',
    Capacity:'Your life can still move you. The feeling still gets through. Hold onto that.'
  };
  var READY = {
    Connection:'This is where it has gone quietest, which means it is the one with the most life waiting in it.',
    Clarity:'The days have started to blur. That is not a flaw in you. It is a sign of how much you have been carrying.',
    Capacity:'You have been running on not-enough for a while. There is room here, waiting to open back up.'
  };

  // ---- teaser (homecoming headline, before the specific moment) ----
  function teaser(){ clear(); var c=el('div','fade'); c.appendChild(logo());
    c.appendChild(el('div','eyebrow','What this showed'));
    c.appendChild(el('h2','','You are not far. You are one breath from the people you named.'));

    var lit=el('div','lit'); lit.appendChild(el('div','k','Still lit in you'));
    lit.appendChild(el('h3','', state.bright)); lit.appendChild(el('p','', LIT[state.bright]));
    c.appendChild(lit);

    var rd=el('div','ready'); rd.appendChild(el('div','k','Most ready to come home'));
    rd.appendChild(el('h3','', state.quiet)); rd.appendChild(el('p','', READY[state.quiet]));
    c.appendChild(rd);

    c.appendChild(el('p','lede','There is one specific moment waiting for you, and one small way back. Want it, so it is yours to keep?'));
    var row=el('div','btn-row');
    var b=el('button','btn','Show me'); b.type='button'; b.addEventListener('click',gate);
    row.appendChild(b); c.appendChild(row);
    app.appendChild(c); window.scrollTo(0,0);
  }

  // ---- soft email offer ----
  function gate(){ clear(); var c=el('div','fade gate'); c.appendChild(logo());
    c.appendChild(el('div','eyebrow','One gentle note'));
    c.appendChild(el('h2','','Want your reflection and your first small step sent to you?'));
    c.appendChild(el('p','','Your moment to come home to, and a few soft notes on finding your way back. One email. No noise, no tracking, no scores.'));
    var inp=el('input'); inp.type='email'; inp.placeholder='you@email.com'; inp.setAttribute('autocomplete','email');
    c.appendChild(inp);
    var row=el('div','btn-row');
    var b=el('button','btn','Send it to me'); b.type='button';
    b.addEventListener('click',function(){ var v=(inp.value||'').trim(); if(v && v.indexOf('@')>0){ state.email=v; reveal(); } else { inp.style.borderColor='#c98a8a'; inp.focus(); } });
    var skip=el('button','btn btn--ghost','Just show me'); skip.type='button'; skip.addEventListener('click',reveal);
    row.appendChild(b); row.appendChild(skip); c.appendChild(row);
    c.appendChild(el('div','fineprint','Leave anytime, in one tap. We will never sell your email or show you a chart of yourself.'));
    app.appendChild(c); window.scrollTo(0,0);
  }

  // ---- the specific moment, tied to who ----
  var MOMENT = {
    partner:'There is a conversation with the person beside you that you keep meaning to have. Fully. With the phone in another room and nowhere else to be.',
    home:'There is a story that keeps ending while you are somewhere else. It is waiting for you to be there for the last page.',
    friend:'There is a friend who would light up at a real hello from you. Not a like. Your actual voice, on an ordinary afternoon.',
    self:'There is a quiet morning that is only yours, before the day takes you. It has been waiting a while for you to sit in it.'
  };
  var SHARE = {
    partner:'And if they wear one too, a single tap reaches across any distance to say I am here, I am thinking of you, without a word.',
    home:'And a single tap can reach them from anywhere, a small hello that lands in their pocket while you are apart.',
    friend:'And a single tap can carry across any distance, a wordless I am thinking of you that closes the gap.',
    self:'And it is only ever between you and you. Nothing to report, no one to answer to.'
  };
  var STEP = {
    evening:'Tonight, one evening with them and no half-glances. Phone in the other room. Just this.',
    head:'Tomorrow, protect one small stretch with nothing else open, and let your head go quiet on one thing.',
    steady:'Tomorrow, one slow meal or one slow walk with no screen. Let your shoulders drop. Notice that you are here.',
    bigger:'Tomorrow, one quiet minute outside with no phone, and sit with the bigger question you have been too busy to ask.'
  };

  // ---- full reveal ----
  function reveal(){ clear(); var c=el('div','fade'); c.appendChild(logo());
    c.appendChild(el('div','eyebrow','The one waiting for you'));

    var mo=el('div','moment'); mo.appendChild(el('div','k','This is the one to come home to'));
    mo.appendChild(el('p','', MOMENT[state.who] || MOMENT.self));
    mo.appendChild(el('div','share', SHARE[state.who] || SHARE.self));
    c.appendChild(mo);

    var felt=el('div','felt'); felt.appendChild(el('div','k','What the gap really is'));
    felt.appendChild(el('p','','This was never about hours on a spreadsheet. It is the drive home you do not remember. The yeah I gave while looking at a screen. The moment that was happening while you were already onto the next one. Small moments, and there is nothing small about them.'));
    c.appendChild(felt);

    var st=el('div','step'); st.appendChild(el('div','k','Your first way back'));
    st.appendChild(el('p','', STEP[state.want] || STEP.evening));
    c.appendChild(st);

    c.appendChild(el('div','hope','Here is the part that matters most. None of it is gone. A few gentle taps a day, no app to open, nothing to measure, and you are back in the room. Not all at once. Starting with tomorrow.'));

    var cta=el('div','cta');
    var b=el('button','btn','See how it feels'); b.type='button';
    b.addEventListener('click',function(){ window.location.href='index.html#shop'; });
    cta.appendChild(b);
    cta.appendChild(el('div','guarantee','Wear Pulse for thirty days. If it does not bring you back to them, send it back for any reason, no questions asked.'));
    cta.appendChild(el('div','sub','A quiet ring. Nothing to check, nothing to score. Just you, brought back to the people who matter.'));
    c.appendChild(cta);

    var rs=el('div','restart');
    var r=el('button','btn btn--ghost','Take a breath and start again'); r.type='button';
    r.addEventListener('click',function(){ state={who:null,conn:null,clar:null,cap:null,want:null,email:null,bright:null,quiet:null}; intro(); });
    rs.appendChild(r); c.appendChild(rs);

    app.appendChild(c); window.scrollTo(0,0);
  }

  intro();
})();
</script>
</body>
</html>
